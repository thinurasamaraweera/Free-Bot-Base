<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXION MD MINI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --surface: #0d0d0d;
            --border: #1a1a1a;
            --neon: #00f2ff; /* Cyan Neon */
            --neon-glow: rgba(0, 242, 255, 0.5);
            --text: #ffffff;
            --muted: #888888;
            --error: #ff3e3e;
        }

        body.light-mode {
            --bg: #ffffff;
            --surface: #f5f5f5;
            --border: #dddddd;
            --neon: #000000;
            --neon-glow: rgba(0, 0, 0, 0.2);
            --text: #000000;
            --muted: #666666;
        }

        * {
            margin: 0; padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        
        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
            overflow: hidden;
        }
        
        .blob {
            position: absolute;
            width: 300px; height: 300px;
            background: var(--neon);
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.05;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(110%, 110%); }
        }

        
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            animation: fadeInScale 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .brand {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.8rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--neon);
            text-shadow: 0 0 15px var(--neon-glow);
            /* --- Animation 3: Text Flicker --- */
            animation: flicker 3s infinite;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { text-shadow: 0 0 15px var(--neon-glow); }
            20%, 24%, 55% { text-shadow: none; opacity: 0.8; }
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px 30px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: all 0.4s ease;
        }

        
        .card:focus-within {
            border-color: var(--neon);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
        }

        .label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--neon);
            margin-bottom: 20px;
            display: block;
            letter-spacing: 1px;
        }

        .input-wrapper {
            margin-bottom: 25px;
            position: relative;
        }

        input[type="tel"] {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            padding: 15px;
            outline: none;
            transition: 0.3s;
        }

        input[type="tel"]:focus {
            background: rgba(255,255,255,0.05);
            border-color: var(--neon);
        }

        
        .btn {
            width: 100%;
            background: var(--neon);
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px var(--neon-glow);
            filter: brightness(1.1);
        }

        .btn:active { transform: translateY(0); }

        .loader {
            width: 18px; height: 18px;
            border: 3px solid #000;
            border-top: 3px solid transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .result {
            margin-top: 25px;
            display: none;
        }

        .result.show { 
            display: block; 
            animation: slideIn 0.5s ease forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .code-display {
            background: rgba(0, 242, 255, 0.05);
            border: 1px dashed var(--neon);
            border-radius: 8px;
            padding: 25px;
            text-align: center;
        }

        .code-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 10px;
            color: var(--neon);
            text-shadow: 0 0 10px var(--neon-glow);
        }

        .copy-link {
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .copy-link:hover { color: var(--neon); }

        .footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.65rem;
            letter-spacing: 4px;
            color: var(--muted);
            opacity: 0.6;
        }

       
        .floating-controls {
            position: fixed;
            top: 25px;
            right: 25px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .f-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 15px;
            border-radius: 50px;
            font-size: 0.7rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .f-btn:hover { border-color: var(--neon); color: var(--neon); }

    </style>
</head>
<body>

<div class="bg-animate">
    <div class="blob"></div>
</div>

<div class="floating-controls">
    <button class="f-btn" onclick="toggleMusic()" id="mBtn">𝐌𝐔𝐒𝐈𝐂: 𝐎𝐅𝐅 🎵</button>
    <button class="f-btn" onclick="toggleTheme()">𝐌𝐎𝐃𝐄 🌓</button>
</div>

<audio id="bgMusic" loop>
    <source src="https://files.catbox.moe/srf3p5.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <div class="brand">
        <h1>𝙉𝙀𝙓𝙄𝙊𝙉 𝙈𝘿 𝙈𝙄𝙉𝙄</h1>
        <div style="font-size: 0.6rem; color: var(--muted); margin-top: 10px; letter-spacing: 3px;">
            <span style="color: var(--neon);">●</span> 𝐒𝐘𝐒𝐓𝐄𝐌 𝐒𝐄𝐂𝐔𝐑𝐄 ⚡
        </div>
    </div>

    <div class="card">
        <label class="label">01. 𝐄𝐍𝐓𝐄𝐑 𝐏𝐇𝐎𝐍𝐄 𝐍𝐔𝐌𝐁𝐄𝐑</label>
        <div class="input-wrapper">
            <input type="tel" id="phoneInput" placeholder="947XXXXXXXX" maxlength="15">
        </div>

        <button class="btn" id="pairBtn" onclick="getPairingCode()">
            <span id="btnText">𝐆𝐄𝐓 𝐏𝐀𝐈𝐑𝐈𝐍𝐆 𝐂𝐎𝐃𝐄</span>
        </button>

        <div class="result" id="result"></div>
    </div>

    <div class="footer">𝐏𝐎𝐖𝐄𝐑𝐃 𝐁𝐘 𝙉𝙀𝙓𝙄𝙊𝙉 𝘿𝙀𝙑 𝙏𝙀𝘼𝙈 🤍</div>
</div>

<script>
    async function getPairingCode() {
        const input = document.getElementById('phoneInput');
        const btn = document.getElementById('pairBtn');
        const btnText = document.getElementById('btnText');
        const resultDiv = document.getElementById('result');

        const number = input.value.trim().replace(/[^0-9]/g, '');

        if (number.length < 7) {
            showError('Invalid Format!');
            return;
        }

        btn.disabled = true;
        btnText.innerHTML = '<center><div class="loader"></div></center>';
        resultDiv.classList.remove('show');

        try {
            const response = await fetch(`/pair?number=${number}`);
            const data = await response.json();

            if (data.code) {
                showCode(data.code, number);
            } else {
                showError(data.error || 'Connection Error');
            }
        } catch (err) {
            showError('Server Offline');
        } finally {
            btn.disabled = false;
            btnText.innerHTML = 'GET PAIRING CODE';
        }
    }

    function showCode(code, number) {
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `
            <div class="code-display">
                <div class="code-text">${code}</div>
                <div class="copy-link" onclick="copyCode('${code}')">CLICK TO COPY CODE</div>
            </div>
            <p style="font-size: 0.7rem; color: var(--muted); margin-top: 15px; line-height: 1.5; text-align: center;">
                Go to WhatsApp Settings > Linked Devices > Link with Phone Number.
            </p>
        `;
        resultDiv.classList.add('show');
    }

    function showError(msg) {
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `<div style="color: var(--error); text-align: center; font-size: 0.8rem; border: 1px solid var(--error); padding: 10px; border-radius: 5px;">${msg}</div>`;
        resultDiv.classList.add('show');
    }

    function copyCode(code) {
        navigator.clipboard.writeText(code);
        const link = document.querySelector('.copy-link');
        link.innerText = 'COPIED SUCCESSFULLY!';
        link.style.color = 'var(--neon)';
        setTimeout(() => {
            link.innerText = 'CLICK TO COPY CODE';
            link.style.color = 'var(--muted)';
        }, 2000);
    }

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
    }

    let isPlaying = false;
    const music = document.getElementById('bgMusic');
    function toggleMusic() {
        if (isPlaying) {
            music.pause();
            document.getElementById('mBtn').innerText = "MUSIC: OFF 🎵";
        } else {
            music.play();
            document.getElementById('mBtn').innerText = "MUSIC: ON 🔊";
        }
        isPlaying = !isPlaying;
    }
</script>

</body>
</html>
