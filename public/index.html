<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXION MD MINI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020205;
            --surface: rgba(13, 13, 13, 0.7);
            --border: rgba(0, 242, 255, 0.3);
            --neon: #00f2ff;
            --neon-glow: rgba(0, 242, 255, 0.6);
            --text: #e0faff;
            --muted: #88a0a8;
            --error: #ff2d55;
            --accent: #bc00ff;
        }

        body.light-mode {
            --bg: #f0f4f8;
            --surface: rgba(255, 255, 255, 0.8);
            --border: #cccccc;
            --neon: #0070f3;
            --neon-glow: rgba(0, 112, 243, 0.3);
            --text: #1a1a1a;
            --muted: #666666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- Advanced Animated Background --- */
        .bg-vfx {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #08101a 0%, #020205 100%);
        }

        .bg-vfx::after {
            content: "";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: transparent url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1;
            animation: bgShift 60s linear infinite;
        }

        @keyframes bgShift {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .orb {
            position: absolute;
            width: 400px; height: 400px;
            background: linear-gradient(45deg, var(--neon), var(--accent));
            filter: blur(120px);
            border-radius: 50%;
            opacity: 0.15;
            animation: drift 15s infinite alternate ease-in-out;
        }

        @keyframes drift {
            0% { transform: translate(-20%, -20%) scale(1); }
            100% { transform: translate(50%, 40%) scale(1.2); }
        }

        /* --- UI Container --- */
        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 420px;
            perspective: 1000px;
        }

        .brand {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--neon);
            text-transform: uppercase;
            filter: drop-shadow(0 0 10px var(--neon-glow));
            margin-bottom: 5px;
        }

        .status-bar {
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: var(--muted);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .pulse {
            width: 8px; height: 8px;
            background: var(--neon);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon);
            animation: pulse-glow 1.5s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.2); }
        }

        /* --- Glass Card --- */
        .card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4), inset 0 0 20px rgba(0, 242, 255, 0.05);
            transition: 0.4s;
        }

        .card:hover {
            border-color: rgba(0, 242, 255, 0.6);
            transform: translateY(-5px);
        }

        .label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: 12px;
            display: block;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 25px;
        }

        input[type="tel"] {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: #fff;
            padding: 18px;
            font-size: 1.3rem;
            font-family: 'JetBrains Mono', monospace;
            outline: none;
            transition: 0.3s;
            text-align: center;
            letter-spacing: 2px;
        }

        input[type="tel"]:focus {
            border-color: var(--neon);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            background: rgba(0,0,0,0.5);
        }

        /* --- Action Button --- */
        .btn {
            width: 100%;
            background: linear-gradient(90deg, var(--neon), #00d4ff);
            color: #020205;
            border: none;
            padding: 20px;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px var(--neon-glow);
        }

        .btn::before {
            content: "";
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .btn:hover::before { left: 100%; }

        /* --- Code Display --- */
        .result { margin-top: 30px; display: none; }
        .result.show { display: block; animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .code-display {
            background: rgba(0, 242, 255, 0.08);
            border: 2px dashed var(--neon);
            border-radius: 15px;
            padding: 30px 15px;
            text-align: center;
        }

        .code-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.4rem;
            color: var(--neon);
            text-shadow: 0 0 15px var(--neon-glow);
            letter-spacing: 8px;
        }

        /* --- Floating UI Elements --- */
        .floating-controls {
            position: fixed;
            top: 20px; right: 20px;
            display: flex; gap: 10px;
            z-index: 100;
        }

        .f-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .f-btn:hover { background: var(--neon); color: #000; }

        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.6rem;
            letter-spacing: 3px;
            color: var(--muted);
            text-transform: uppercase;
        }

        /* Loader */
        .loader {
            width: 20px; height: 20px;
            border: 3px solid #000;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

<div class="bg-vfx">
    <div class="orb"></div>
</div>

<div class="floating-controls">
    <button class="f-btn" onclick="toggleMusic()" id="mBtn">MUSIC: OFF</button>
    <button class="f-btn" onclick="toggleTheme()">THEME</button>
</div>

<audio id="bgMusic" loop>
    <source src="https://files.catbox.moe/srf3p5.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <div class="brand">
        <h1>NEXION MD</h1>
        <div class="status-bar">
            <div class="pulse"></div>
            <span>V2.0 STABLE SECURED</span>
        </div>
    </div>

    <div class="card">
        <label class="label">Step 01: Identification</label>
        <div class="input-wrapper">
            <input type="tel" id="phoneInput" placeholder="947XXXXXXXX" maxlength="15">
        </div>

        <button class="btn" id="pairBtn" onclick="getPairingCode()">
            <span id="btnText">Execute Pairing</span>
        </button>

        <div class="result" id="result"></div>
    </div>

    <div class="footer">
        Engineered by <span style="color:var(--neon)">NEXION DEV TEAM</span>
    </div>
</div>

<script>
    // --- JS Logic (පැරණි logic එකමයි, මුකුත් වෙනස් කර නැත) ---
    async function getPairingCode() {
        const input = document.getElementById('phoneInput');
        const btn = document.getElementById('pairBtn');
        const btnText = document.getElementById('btnText');
        const resultDiv = document.getElementById('result');
        const number = input.value.trim().replace(/[^0-9]/g, '');

        if (number.length < 7) {
            showError('INVALID NUMBER FORMAT');
            return;
        }

        btn.disabled = true;
        btnText.innerHTML = '<center><div class="loader"></div></center>';
        resultDiv.classList.remove('show');

        try {
            const response = await fetch(`/pair?number=${number}`);
            const data = await response.json();
            if (data.code) {
                showCode(data.code, number);
            } else {
                showError(data.error || 'ACCESS DENIED');
            }
        } catch (err) {
            showError('SERVER OFFLINE');
        } finally {
            btn.disabled = false;
            btnText.innerHTML = 'Execute Pairing';
        }
    }

    function showCode(code, number) {
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `
            <div class="code-display">
                <div class="code-text">${code}</div>
                <div style="font-size:0.7rem; color:var(--muted); margin-top:15px; cursor:pointer;" onclick="copyCode('${code}')" class="clink">TAP TO COPY CODE</div>
            </div>
            <p style="font-size: 0.65rem; color: var(--muted); margin-top: 20px; text-align: center; line-height:1.6;">
                SETTINGS > LINKED DEVICES > LINK WITH PHONE NUMBER
            </p>
        `;
        resultDiv.classList.add('show');
    }

    function showError(msg) {
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `<div style="color: var(--error); text-align: center; font-size: 0.8rem; border: 1px solid var(--error); padding: 15px; border-radius: 12px; font-family:'JetBrains Mono'">${msg}</div>`;
        resultDiv.classList.add('show');
    }

    function copyCode(code) {
        navigator.clipboard.writeText(code);
        const link = document.querySelector('.clink');
        link.innerText = 'COPIED TO CLIPBOARD!';
        link.style.color = 'var(--neon)';
        setTimeout(() => { link.innerText = 'TAP TO COPY CODE'; link.style.color = 'var(--muted)'; }, 2000);
    }

    function toggleTheme() { document.body.classList.toggle('light-mode'); }

    let isPlaying = false;
    const music = document.getElementById('bgMusic');
    function toggleMusic() {
        if (isPlaying) {
            music.pause();
            document.getElementById('mBtn').innerText = "MUSIC: OFF";
        } else {
            music.play();
            document.getElementById('mBtn').innerText = "MUSIC: ON";
        }
        isPlaying = !isPlaying;
    }
</script>

</body>
</html>
